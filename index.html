<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlyAero - Book Your Next Flight</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-light: #818CF8;
            --secondary: #EC4899;
            --surface-color: rgba(255, 255, 255, 0.9);
            --text-main: #1F2937;
            --text-muted: #6B7280;
            --border-color: #E5E7EB;
            --focus-ring: rgba(79, 70, 229, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .booking-container {
            background: var(--surface-color);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            padding: 40px;
            width: 100%;
            max-width: 900px;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .header {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
        }

        .header svg {
            width: 32px;
            height: 32px;
            color: var(--primary);
            margin-right: 12px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        .trip-type {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .radio-btn {
            display: none;
        }

        .radio-label {
            padding: 10px 24px;
            background: #F3F4F6;
            border-radius: 999px;
            color: var(--text-muted);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 15px;
        }

        .radio-btn:checked + .radio-label {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 24px;
            margin-bottom: 30px;
        }

        .input-group {
            position: relative;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper svg {
            position: absolute;
            left: 16px;
            width: 20px;
            height: 20px;
            color: var(--text-muted);
            pointer-events: none;
        }

        input, select {
            width: 100%;
            padding: 16px 16px 16px 48px;
            background: #ffffff;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            font-size: 16px;
            color: var(--text-main);
            font-weight: 500;
            transition: all 0.3s ease;
            outline: none;
            appearance: none;
        }

        input:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--focus-ring);
        }

        select {
            cursor: pointer;
            padding-right: 48px;
        }
        
        .select-arrow {
            position: absolute;
            right: 16px;
            width: 16px;
            height: 16px;
            color: var(--text-muted);
            pointer-events: none;
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            position: absolute;
            left: 16px;
            width: 20px;
            height: 20px;
            opacity: 0;
            cursor: pointer;
        }

        .submit-btn {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            border: none;
            padding: 18px 40px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.4);
        }

        .submit-btn svg {
            width: 24px;
            height: 24px;
            transition: transform 0.3s ease;
        }

        .submit-btn:hover svg {
            transform: translateX(5px);
        }

        @media (max-width: 768px) {
            .booking-container {
                padding: 24px;
            }
            .form-grid {
                grid-template-columns: 1fr;
            }
        }
        
        .disabled-field {
            opacity: 0.5;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <main class="booking-container">
        <header class="header">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.2-1.1.7l-1 2.5c-.1.3 0 .7.3.9l6.5 3.5L7 16.5 4.3 16l-2.1 1.1c-.2.1-.3.3-.3.5v.4c0 .3.2.5.5.5l5.5 1 1 5.5c.1.3.3.5.5.5h.4c.2 0 .4-.1.5-.3l1.1-2.1-.5-2.7 2.7-2.5 3.5 6.5c.2.3.6.4.9.3l2.5-1c.5-.2.8-.6.7-1.1z"/>
            </svg>
            <h1>My name is deepakarthi</h1>
        </header>

        <section class="trip-type">
            <input type="radio" name="trip" id="return" class="radio-btn" checked>
            <label for="return" class="radio-label">Round Trip</label>

            <input type="radio" name="trip" id="oneway" class="radio-btn">
            <label for="oneway" class="radio-label">One Way</label>
        </section>

        <form action="#" method="GET" id="booking-form">
            <div class="form-grid">
                <!-- Origin -->
                <div class="input-group">
                    <label for="from">Leaving From</label>
                    <div class="input-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                        <input type="text" id="from" placeholder="City or Airport" required>
                    </div>
                </div>

                <!-- Destination -->
                <div class="input-group">
                    <label for="to">Going To</label>
                    <div class="input-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 16.3c3.2 2.8 7.3 4.7 11.3 5.4.4.1.8-.1 1-.5l1.4-3.5c.2-.5 0-1.1-.4-1.4l-4.2-2.7c-.4-.3-.9-.2-1.3.1l-1.5 1.5c-3.1-1.6-5.5-4-7.2-7.1l1.5-1.5c.3-.4.4-.9.1-1.3L4.9 1.1c-.3-.4-.9-.6-1.4-.4L0 2.1c-.4.2-.6.6-.5 1 .7 4 2.6 8.1 5.4 11.3z"/><path d="m22 2-7.5 7.5"/></svg>
                        <input type="text" id="to" placeholder="City or Airport" required>
                    </div>
                </div>

                <!-- Departure Date -->
                <div class="input-group">
                    <label for="depart">Depart</label>
                    <div class="input-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                        <input type="date" id="depart" required>
                    </div>
                </div>

                <!-- Return Date -->
                <div class="input-group" id="return-box">
                    <label for="return-date">Return</label>
                    <div class="input-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                        <input type="date" id="return-date" required>
                    </div>
                </div>

                <!-- Passengers and Class -->
                <div class="input-group">
                    <label for="passengers">Travelers & Class</label>
                    <div class="input-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                        <select id="passengers">
                            <option value="1">1 Adult, Economy</option>
                            <option value="2">2 Adults, Economy</option>
                            <option value="3">1 Adult, Business</option>
                            <option value="4">2 Adults, Business</option>
                        </select>
                        <svg class="select-arrow" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
                    </div>
                </div>
            </div>

            <button type="submit" class="submit-btn">
                Search Flights
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
            </button>
        </form>
    </main>

    <script>
        // Set minimum dates to today
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('depart').min = today;
        document.getElementById('return-date').min = today;

        // Sync return date min with depart date
        document.getElementById('depart').addEventListener('change', function(e) {
            document.getElementById('return-date').min = e.target.value;
            if(document.getElementById('return-date').value < e.target.value) {
                document.getElementById('return-date').value = e.target.value;
            }
        });

        // Handle one-way / round-trip toggle
        const onewayRadio = document.getElementById('oneway');
        const returnRadio = document.getElementById('return');
        const returnBox = document.getElementById('return-box');
        const returnInput = document.getElementById('return-date');

        onewayRadio.addEventListener('change', () => {
            returnBox.classList.add('disabled-field');
            returnInput.required = false;
            returnInput.value = '';
        });

        returnRadio.addEventListener('change', () => {
            returnBox.classList.remove('disabled-field');
            returnInput.required = true;
        });

        // Form submission demo
        document.getElementById('booking-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = document.querySelector('.submit-btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = 'Searching...';
            
            setTimeout(() => {
                alert('Searching flights from ' + document.getElementById('from').value + ' to ' + document.getElementById('to').value);
                btn.innerHTML = originalText;
            }, 1000);
        });
    </script>
</body>
</html>
